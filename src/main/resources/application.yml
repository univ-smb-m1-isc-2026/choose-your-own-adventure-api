spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cyoa}
    username: ${SPRING_DATASOURCE_USERNAME:cyoa_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cyoa_password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: password
server:
  port: 8080

app:
  jwt-secret: ${JWT_SECRET:8f2a9c3d4e8b1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d}
  jwt-expiration-milliseconds: ${JWT_EXPIRATION_TIME:604800000}
